<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novinko — Všetky aktuálne správy na jednom mieste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e0ddd5;
      --accent: #c8a227;
      --text: #1a1a1a;
      --muted: #888;
      --header-bg: #1a1a1a;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header-bg);
      border-bottom: 3px solid var(--accent);
      padding: 0 clamp(16px, 4vw, 48px);
    }

    .header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; gap: 24px;
    }

    .logo-wrap { display: flex; flex-direction: column; gap: 1px; text-decoration: none; flex-shrink: 0; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .logo-tagline { font-size: 0.62rem; color: #666; letter-spacing: 0.5px; text-transform: uppercase; }

    .filters { display: flex; gap: 6px; flex-shrink: 0; }
    .filter-btn {
      background: transparent; border: 1px solid #444; color: #aaa;
      padding: 6px 14px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .refresh-btn {
      background: transparent; border: 1px solid #444; color: #888;
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 1rem;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #666; }
    .live-dot::before { content: ''; width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

    /* TICKER */
    .ticker-wrap { background: #111; border-bottom: 1px solid #222; overflow: hidden; height: 40px; display: flex; align-items: center; }
    .ticker-label { background: var(--accent); color: #000; font-size: 0.72rem; font-weight: 900; padding: 0 16px; height: 100%; display: flex; align-items: center; letter-spacing: 1.5px; flex-shrink: 0; text-transform: uppercase; }
    .ticker-track { display: flex; gap: 0; animation: ticker 50s linear infinite; white-space: nowrap; }
    .ticker-item { font-size: 0.82rem; font-weight: 500; color: #e0e0e0; padding: 0 32px; border-right: 1px solid #333; cursor: pointer; transition: color 0.2s; }
    .ticker-item::before { content: '▸ '; color: var(--accent); font-size: 0.7rem; }
    .ticker-item:hover { color: #fff; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* PAGE LAYOUT */
    .page-layout {
      max-width: 1400px; margin: 0 auto;
      padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 48px);
      display: grid; grid-template-columns: 1fr 300px; gap: 32px; align-items: start;
    }

    main { min-width: 0; }

    /* HERO SECTION */
    .hero-section {
      display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto;
      gap: 2px; margin-bottom: 40px;
      background: var(--border); border: 1px solid var(--border); overflow: hidden;
    }

    .hero-card {
      background: var(--surface); position: relative; overflow: hidden;
      cursor: pointer; transition: filter 0.2s; text-decoration: none; display: block;
    }
    .hero-card:hover { filter: brightness(1.05); }
    .hero-card.featured { grid-column: 1 / 3; grid-row: 1 / 3; min-height: 420px; }
    .hero-card:not(.featured) { min-height: 200px; }

    /* GRADIENT CARDS */
    .card-gradient-bg { position: absolute; inset: 0; z-index: 0; }
    .card-bg-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9rem; opacity: 0.07; pointer-events: none; user-select: none; line-height: 1; z-index: 1; }
    .hero-card.featured .card-bg-icon { font-size: 16rem; }
    .card-bg-typo { position: absolute; top: 8px; left: 8px; right: 8px; font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: #fff; opacity: 0.04; line-height: 1.1; pointer-events: none; user-select: none; overflow: hidden; max-height: 55%; z-index: 1; }
    .hero-card.featured .card-bg-typo { font-size: 5rem; }
    .card-gradient-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 75%; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.3) 60%, transparent 100%); z-index: 2; }
    .card-accent-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 3; }

    .card-img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .hero-card.featured .card-img { height: 100%; min-height: 420px; }

    /* Text vždy na obrázku pre featured kartu */
    .hero-card.featured { position: relative; }
    .hero-card.featured .card-body {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 28px 32px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
      z-index: 3;
    }
    .hero-card:not(.featured) { position: relative; }
    .hero-card:not(.featured) .card-body {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.35) 60%, transparent 100%);
      z-index: 3;
    }

    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .card-time { font-size: 0.72rem; font-weight: 700; color: var(--accent); margin-left: auto; background: rgba(0,0,0,0.3); padding: 2px 7px; border-radius: 10px; }
    .card-title { font-family: 'Playfair Display', serif; font-weight: 700; color: #fff; line-height: 1.3; }
    .hero-card.featured .card-title { font-size: 1.5rem; margin-bottom: 8px; }
    .hero-card:not(.featured) .card-title { font-size: 1rem; }
    .card-desc { font-size: 0.82rem; color: rgba(255,255,255,0.65); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* PILLS */
    .cat-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; }
    .pill-slovensko { background: rgba(79,195,247,0.2); color: #4fc3f7; border: 1px solid rgba(79,195,247,0.3); }
    .pill-svet      { background: rgba(162,155,254,0.2); color: #a29bfe; border: 1px solid rgba(162,155,254,0.3); }
    .pill-ekonomika { background: rgba(76,175,80,0.2); color: #81c784; border: 1px solid rgba(76,175,80,0.3); }
    .pill-sport     { background: rgba(255,152,0,0.2); color: #ffb74d; border: 1px solid rgba(255,152,0,0.3); }
    .pill-krypto    { background: rgba(232,197,71,0.2); color: #e8c547; border: 1px solid rgba(232,197,71,0.3); }

    /* SECTION HEADER */
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .section-divider { height: 3px; background: var(--accent); width: 36px; flex-shrink: 0; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); }
    .section-count { font-size: 0.78rem; color: var(--muted); }

    /* LIST CARDS — svetlé */
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); overflow: hidden; margin-bottom: 48px; }

    .list-card { background: var(--surface); padding: 16px; cursor: pointer; transition: background 0.2s; text-decoration: none; display: flex; gap: 14px; align-items: flex-start; }
    .list-card:hover { background: var(--surface2); }

    .list-thumb { width: 80px; height: 80px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
    .list-thumb-grad { width: 80px; height: 80px; border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; position: relative; overflow: hidden; }

    .list-content { flex: 1; min-width: 0; }
    .list-cat { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
    .list-cat.slovensko { color: #1a6bbf; }
    .list-cat.svet      { color: #7c6af7; }
    .list-cat.ekonomika { color: #2b9348; }
    .list-cat.sport     { color: #e07b00; }
    .list-cat.krypto    { color: var(--accent); }
    .list-title { font-family: 'Playfair Display', serif; font-size: 0.92rem; font-weight: 700; color: var(--text); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .list-meta { font-size: 0.7rem; color: var(--muted); margin-top: 5px; display: flex; align-items: center; gap: 6px; }
    .list-meta .time { font-weight: 700; color: var(--accent); background: #f5f0e0; padding: 1px 7px; border-radius: 10px; font-size: 0.68rem; }

    /* LOADING */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; color: var(--muted); }
    .loader { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* SIDEBAR */
    .sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; gap: 16px; }
    .sidebar-section { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
    .sidebar-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .trending-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); text-decoration: none; transition: background 0.2s; cursor: pointer; }
    .trending-item:last-child { border-bottom: none; }
    .trending-item:hover { background: var(--surface2); }
    .trending-num { font-size: 1.1rem; font-weight: 900; color: var(--border); flex-shrink: 0; width: 20px; line-height: 1.3; }
    .trending-item:nth-child(1) .trending-num { color: var(--accent); }
    .trending-item:nth-child(2) .trending-num { color: #aaa; }
    .trending-item:nth-child(3) .trending-num { color: #cd7f32; }
    .trending-text { font-size: 0.82rem; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .trending-source { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .cat-stat { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .cat-stat:last-child { border-bottom: none; }
    .cat-stat-bar { height: 3px; border-radius: 2px; margin-top: 4px; }
    .cat-stat-count { font-size: 0.72rem; color: var(--muted); }

    /* FOOTER */
    footer { border-top: 3px solid var(--accent); padding: 24px clamp(16px, 4vw, 48px); text-align: center; color: var(--muted); font-size: 0.78rem; background: var(--surface); margin-top: 48px; }


    /* SKELETON LOADING */
    .skeleton-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto; gap: 2px;
      margin-bottom: 40px; background: var(--border);
      border: 1px solid var(--border); overflow: hidden;
    }
    .skeleton-card { background: var(--surface); position: relative; overflow: hidden; }
    .skeleton-card.featured { grid-column: 1 / 3; grid-row: 1 / 3; min-height: 420px; }
    .skeleton-card:not(.featured) { min-height: 200px; }
    .skeleton-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.04) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-bar { background: #e8e5df; border-radius: 3px; margin: 8px 16px; }

    .skeleton-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); overflow: hidden; margin-bottom: 48px; }
    .skeleton-item { background: var(--surface); padding: 16px; display: flex; gap: 14px; }
    .skeleton-thumb { width: 80px; height: 80px; background: #e8e5df; border-radius: 3px; flex-shrink: 0; }
    .skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }


    /* FADE IN */
    .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .page-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; flex-direction: row; flex-wrap: wrap; }
      .sidebar-section { flex: 1; min-width: 280px; }
    }

    @media (max-width: 900px) {
      .hero-section { grid-template-columns: 1fr 1fr; }
      .hero-card.featured { grid-column: 1 / 3; grid-row: 1; min-height: 300px; }
      .hero-card.featured .card-img { min-height: 300px; height: 300px; }
    }

    @media (max-width: 600px) {
      .hero-section { grid-template-columns: 1fr; }
      .hero-card.featured { grid-column: 1; grid-row: 1; }
      .live-dot span { display: none; }
      .sidebar { display: none; }
      .filters {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
        background: rgba(26,26,26,0.97); backdrop-filter: blur(14px);
        border-top: 1px solid #333; padding: 10px 12px 14px;
        overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch;
        scrollbar-width: none; gap: 8px; flex-wrap: nowrap; justify-content: flex-start; display: flex;
      }
      .filters::-webkit-scrollbar { display: none; }
      .filter-btn { flex-shrink: 0; padding: 8px 16px; font-size: 0.84rem; }
      .page-layout { padding: 12px 12px 80px; }
      footer { margin-bottom: 64px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo-wrap">
      <span class="logo">novinko<span>.</span></span>
      <span class="logo-tagline">Všetky aktuálne správy na jednom mieste</span>
    </a>
    <div class="filters">
      <button class="filter-btn active" data-cat="all">Všetko</button>
      <button class="filter-btn" data-cat="slovensko">🇸🇰 Slovensko</button>
      <button class="filter-btn" data-cat="svet">🌍 Svet</button>
      <button class="filter-btn" data-cat="ekonomika">💰 Ekonomika</button>
      <button class="filter-btn" data-cat="sport">⚽ Šport</button>
      <button class="filter-btn" data-cat="krypto">₿ Krypto</button>
    </div>
    <div class="header-right">
      <div class="live-dot"><span>Live</span></div>
      <button class="refresh-btn" id="refreshBtn" title="Obnoviť">↻</button>
    </div>
  </div>
</header>

<div class="ticker-wrap" id="tickerWrap" style="display:none">
  <div class="ticker-label">SPRÁVY</div>
  <div style="overflow:hidden;flex:1">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<div class="page-layout">
  <main>
    <div id="content">
      <div class="loading">
        <div class="loader"></div>
        <span>Načítavam správy…</span>
      </div>
    </div>
  </main>
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">🔥 Trending</div>
      <div id="trendingList"><div class="loading" style="padding:20px 0"><div class="loader" style="width:24px;height:24px"></div></div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">📊 Podľa kategórie</div>
      <div id="catStats"></div>
    </div>
  </aside>
</div>

<footer>
  novinko &mdash; všetky aktuálne správy na jednom mieste &mdash; <span id="lastUpdate"></span>
</footer>

<script>
  let allItems = [];
  let currentCat = 'all';

  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 60) return 'práve teraz';
    if (diff < 3600) return `${Math.floor(diff/60)} min`;
    if (diff < 86400) return `${Math.floor(diff/3600)} hod`;
    return `${Math.floor(diff/86400)} d`;
  }

  const CAT_STYLES = {
    slovensko: { grad: 'linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)', icon: '🇸🇰', line: '#4fc3f7', pill: 'pill-slovensko', cat: 'slovensko' },
    svet:      { grad: 'linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%)', icon: '🌍', line: '#a29bfe', pill: 'pill-svet',      cat: 'svet' },
    ekonomika: { grad: 'linear-gradient(135deg,#134e5e 0%,#1a6b3c 100%)',             icon: '💰', line: '#81c784', pill: 'pill-ekonomika', cat: 'ekonomika' },
    sport:     { grad: 'linear-gradient(135deg,#7f2a00 0%,#c0392b 100%)',             icon: '⚽', line: '#ffb74d', pill: 'pill-sport',     cat: 'sport' },
    krypto:    { grad: 'linear-gradient(135deg,#0f0c29 0%,#302b63 60%,#1a1a4e 100%)', icon: '₿',  line: '#e8c547', pill: 'pill-krypto',   cat: 'krypto' },
  };

  function getCatStyle(cat) {
    return CAT_STYLES[cat] || { grad: 'linear-gradient(135deg,#1a1a2e,#2a2a2a)', icon: '📰', line: '#555', pill: '', cat: cat };
  }

  function sourcePlaceholder(item, large = false) {
    const cs = getCatStyle(item.category);
    const size = large ? 'min-height:420px' : 'height:200px';
    return `<div style="position:relative;${size};width:100%;overflow:hidden">
      <div class="card-gradient-bg" style="background:${cs.grad}"></div>
      <div class="card-bg-icon">${cs.icon}</div>
      <div class="card-bg-typo">${item.title}</div>
      <div class="card-gradient-overlay"></div>
      <div class="card-accent-line" style="background:linear-gradient(90deg,${cs.line},transparent)"></div>
    </div>`;
  }

  function cardHTML(item, featured = false) {
    const cs = getCatStyle(item.category);
    const imgEl = item.image ? `<img class="card-img" src="${item.image}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
    const noImgEl = item.image ? '' : sourcePlaceholder(item, featured);
    return `
      <a href="${item.link}" target="_blank" rel="noopener" class="hero-card ${featured ? 'featured' : ''} fade-in">
        ${imgEl}${noImgEl}
        <div class="card-body">
          <div class="card-meta">
            <span class="cat-pill ${cs.pill}">${cs.icon} ${item.category}</span>
            <span class="card-time">${timeAgo(item.pubDate)}</span>
          </div>
          <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:5px">${item.source}</div>
          <div class="card-title">${item.title}</div>
          ${item.description && featured ? `<div class="card-desc">${item.description}</div>` : ''}
        </div>
      </a>`;
  }

  function listCardHTML(item) {
    const cs = getCatStyle(item.category);
    const thumbEl = item.image ? `<img class="list-thumb" src="${item.image}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
    const noThumb = item.image ? '' : `<div class="list-thumb-grad" style="background:${cs.grad}">
      <span style="font-size:1.6rem;opacity:0.8">${cs.icon}</span>
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${cs.line},transparent)"></div>
    </div>`;
    return `
      <a href="${item.link}" target="_blank" rel="noopener" class="list-card fade-in">
        ${thumbEl}${noThumb}
        <div class="list-content">
          <div class="list-cat ${item.category}">${cs.icon} ${item.category}</div>
          <div class="list-title">${item.title}</div>
          <div class="list-meta">${item.source} <span class="time">${timeAgo(item.pubDate)}</span></div>
        </div>
      </a>`;
  }

  function renderSidebar(items) {
    const trending = items.slice(0, 8);
    const tList = document.getElementById('trendingList');
    if (tList) {
      tList.innerHTML = trending.map((item, i) => `
        <a href="${item.link}" target="_blank" rel="noopener" class="trending-item">
          <div class="trending-num">${i + 1}</div>
          <div>
            <div class="trending-text">${item.title}</div>
            <div class="trending-source">${item.source} · ${timeAgo(item.pubDate)}</div>
          </div>
        </a>`).join('');
    }
    const cats = { slovensko: 0, svet: 0, ekonomika: 0, sport: 0, krypto: 0 };
    items.forEach(i => { if (cats[i.category] !== undefined) cats[i.category]++; });
    const total = items.length || 1;
    const catColors = { slovensko: '#1a6bbf', svet: '#7c6af7', ekonomika: '#2b9348', sport: '#e07b00', krypto: '#c8a227' };
    const catLabels = { slovensko: '🇸🇰 Slovensko', svet: '🌍 Svet', ekonomika: '💰 Ekonomika', sport: '⚽ Šport', krypto: '₿ Krypto' };
    const catStats = document.getElementById('catStats');
    if (catStats) {
      catStats.innerHTML = Object.entries(cats).map(([cat, count]) => `
        <div class="cat-stat">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span>${catLabels[cat]}</span>
              <span class="cat-stat-count">${count}</span>
            </div>
            <div class="cat-stat-bar" style="background:${catColors[cat]};width:${Math.round(count/total*100)}%;min-width:${count?4:0}px"></div>
          </div>
        </div>`).join('');
    }
  }

  function renderTicker(items) {
    const track = document.getElementById('tickerTrack');
    const wrap = document.getElementById('tickerWrap');
    const titles = items.slice(0, 15).map(i => `<span class="ticker-item">${i.title}</span>`).join('');
    track.innerHTML = titles + titles;
    wrap.style.display = 'flex';
  }

  function renderContent(items) {
    const content = document.getElementById('content');
    if (!items.length) { content.innerHTML = '<div class="loading"><span>Žiadne správy</span></div>'; return; }
    const hero = items.slice(0, 3);
    const rest = items.slice(3);
    let html = '<div class="hero-section">';
    hero.forEach((item, i) => { html += cardHTML(item, i === 0); });
    html += '</div>';
    if (rest.length) {
      html += `<div class="section-header">
        <div class="section-divider"></div>
        <span class="section-title">Ďalšie správy</span>
        <span class="section-count">${rest.length} článkov</span>
      </div>`;
      html += '<div class="news-grid">';
      rest.forEach(item => { html += listCardHTML(item); });
      html += '</div>';
    }
    content.innerHTML = html;
  }

  function renderSkeleton() {
    const content = document.getElementById('content');
    const skeletonHero = `<div class="skeleton-grid">
      <div class="skeleton-card featured"><div class="skeleton-bar" style="height:20px;margin-top:360px;width:60%"></div><div class="skeleton-bar" style="height:14px;width:80%"></div></div>
      <div class="skeleton-card"><div class="skeleton-bar" style="height:14px;margin-top:140px;width:70%"></div><div class="skeleton-bar" style="height:12px;width:50%"></div></div>
      <div class="skeleton-card"><div class="skeleton-bar" style="height:14px;margin-top:140px;width:70%"></div><div class="skeleton-bar" style="height:12px;width:50%"></div></div>
    </div>`;
    const skeletonList = `<div class="skeleton-list">${Array(6).fill(`
      <div class="skeleton-item">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-lines">
          <div class="skeleton-bar" style="height:10px;width:40%"></div>
          <div class="skeleton-bar" style="height:14px;width:90%"></div>
          <div class="skeleton-bar" style="height:14px;width:75%"></div>
          <div class="skeleton-bar" style="height:10px;width:30%"></div>
        </div>
      </div>`).join('')}</div>`;
    content.innerHTML = skeletonHero + skeletonList;
  }

  async function loadNews(cat = 'all') {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    renderSkeleton();
    try {
      const res = await fetch(`/.netlify/functions/fetch-rss?category=${cat}`);
      const data = await res.json();
      allItems = data.items || [];
      renderTicker(allItems);
      renderSidebar(allItems);
      renderContent(allItems);
      document.getElementById('lastUpdate').textContent = 'Aktualizované: ' + new Date().toLocaleTimeString('sk-SK');
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="loading"><span>Chyba pri načítavaní správ</span></div>';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      loadNews(currentCat);
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', () => loadNews(currentCat));
  setInterval(() => loadNews(currentCat), 5 * 60 * 1000);
  loadNews();
</script>
</body>
</html>
