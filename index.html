<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novinko — Všetky aktuálne správy na jednom mieste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #d8d3c8;
      --border-light: #ece9e2;
      --accent: #c0392b;
      --accent2: #1a3a5c;
      --text: #111111;
      --text2: #333333;
      --muted: #7a7468;
      --header-bg: #1a1a1a;
      --cat-sk: #1a3a5c;
      --cat-svet: #4a235a;
      --cat-eko: #1a4a2a;
      --cat-sport: #7a2a00;
      --cat-krypto: #7a6200;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ─── MASTHEAD ─── */
    .masthead {
      background: var(--header-bg);
      border-bottom: 1px solid #333;
      padding: 0 clamp(16px, 4vw, 48px);
    }
    .masthead-inner {
      max-width: 1300px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo-wrap { text-decoration: none; display: flex; align-items: baseline; gap: 6px; }
    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.75rem; font-weight: 700;
      color: #fff; letter-spacing: -0.5px;
    }
    .logo-dot { color: var(--accent); }
    .logo-tagline {
      font-size: 0.6rem; color: #999; letter-spacing: 1.5px;
      text-transform: uppercase; font-weight: 400;
      border-left: 1px solid #333; padding-left: 10px; margin-left: 4px;
    }

    /* NAV FILTERS */
    .nav-filters {
      display: flex; gap: 0;
      border-left: 1px solid #333; margin-left: 12px;
    }
    .filter-btn {
      background: transparent; border: none; border-right: 1px solid #333;
      color: #888; padding: 0 16px; height: 60px;
      font-family: 'Source Sans 3', sans-serif; font-size: 0.78rem;
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { color: #fff; background: #252525; }
    .filter-btn.active { color: #fff; background: var(--accent); border-color: var(--accent); }

    .masthead-right { display: flex; align-items: center; gap: 16px; }
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.65rem; color: #555; letter-spacing: 1px; text-transform: uppercase;
    }
    .live-badge::before {
      content: ''; width: 6px; height: 6px; background: #4caf50;
      border-radius: 50%; animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .refresh-btn {
      background: transparent; border: 1px solid #333; color: #666;
      width: 32px; height: 32px; border-radius: 2px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; font-size: 0.9rem;
    }
    .refresh-btn:hover { border-color: #666; color: #aaa; }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SECTION NAV BAR ─── */
    .section-nav {
      background: var(--surface);
      border-bottom: 3px solid var(--text);
      padding: 0 clamp(16px, 4vw, 48px);
    }
    .section-nav-inner {
      max-width: 1300px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 36px;
    }
    .edition-label {
      font-size: 0.7rem; color: var(--muted); letter-spacing: 0.5px;
      font-style: italic; font-family: 'Libre Baskerville', serif;
    }
    .last-update { font-size: 0.68rem; color: var(--muted); }

    /* ─── TICKER ─── */
    .ticker-wrap {
      background: var(--accent); overflow: hidden; height: 34px;
      display: none; align-items: center;
    }
    .ticker-label {
      background: #000; color: #fff; font-size: 0.65rem;
      font-weight: 700; padding: 0 14px; height: 100%;
      display: flex; align-items: center; letter-spacing: 2px;
      text-transform: uppercase; flex-shrink: 0;
    }
    .ticker-track { display: flex; gap: 0; animation: ticker 60s linear infinite; white-space: nowrap; }
    .ticker-item {
      font-size: 0.75rem; font-weight: 600; color: #fff;
      padding: 0 28px; border-right: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center;
    }
    .ticker-item::before { content: '▸ '; margin-right: 6px; opacity: 0.7; font-size: 0.6rem; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ─── PAGE LAYOUT ─── */
    .page-layout {
      max-width: 1300px; margin: 0 auto;
      padding: 0 clamp(16px, 4vw, 48px);
      display: grid; grid-template-columns: 1fr 280px; gap: 40px; align-items: start;
    }
    main { min-width: 0; padding-top: 32px; }

    /* ─── HERO / FRONT PAGE ─── */
    .front-page { margin-bottom: 40px; }

    /* Big story */
    .story-featured {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px; margin-bottom: 24px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;
    }
    .story-featured-left {}
    .story-featured-right {}

    .story-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 10px; display: block;
    }
    .label-slovensko { color: var(--cat-sk); }
    .label-svet      { color: var(--cat-svet); }
    .label-ekonomika { color: var(--cat-eko); }
    .label-sport     { color: var(--cat-sport); }
    .label-krypto    { color: var(--cat-krypto); }

    .story-headline-xl {
      font-family: 'Libre Baskerville', serif;
      font-size: 2.4rem; font-weight: 700; line-height: 1.15;
      color: var(--text); margin-bottom: 14px; letter-spacing: -0.3px;
      text-decoration: none; display: block;
    }
    .story-headline-xl:hover { color: var(--accent); }

    .story-summary {
      font-size: 0.95rem; color: var(--text2); line-height: 1.65;
      font-weight: 300; margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }

    .story-byline {
      font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 8px;
    }
    .story-byline-source { font-weight: 600; color: var(--text2); }
    .story-byline-sep { color: var(--border); }
    .story-byline-time { font-style: italic; }

    /* Secondary stories grid */
    .stories-secondary {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0; border-top: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .story-secondary {
      padding: 20px 24px 20px 0; border-right: 1px solid var(--border);
      text-decoration: none;
    }
    .story-secondary:last-child { border-right: none; padding-right: 0; }
    .story-secondary:first-child { padding-left: 0; }
    .story-secondary:not(:first-child) { padding-left: 24px; }
    .story-secondary:hover .story-headline-sm { color: var(--accent); }

    .story-headline-sm {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.0rem; font-weight: 700; line-height: 1.3;
      color: var(--text); margin-bottom: 8px; transition: color 0.15s;
    }
    .story-headline-md {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.2rem; font-weight: 700; line-height: 1.3;
      color: var(--text); margin-bottom: 10px; transition: color 0.15s;
    }

    /* ─── SECTION DIVIDER ─── */
    .section-head {
      display: flex; align-items: center; gap: 12px;
      border-top: 3px solid var(--text); padding-top: 8px;
      margin: 32px 0 20px;
    }
    .section-head-title {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text);
    }
    .section-head-count {
      font-size: 0.68rem; color: var(--muted);
      margin-left: auto; font-style: italic;
    }

    /* ─── NEWS LIST ─── */
    .news-list { display: flex; flex-direction: column; }
    .news-row {
      display: grid; grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border-light);
    }
    .news-item {
      padding: 16px 20px 16px 0;
      border-right: 1px solid var(--border-light);
      text-decoration: none; display: block;
      transition: background 0.1s;
    }
    .news-item:last-child { border-right: none; padding-left: 20px; padding-right: 0; }
    .news-item:hover { background: #f5f3ee; }
    .news-item:hover .news-title { color: var(--accent); }

    .news-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.9rem; font-weight: 700; line-height: 1.35;
      color: var(--text); margin-bottom: 4px; transition: color 0.15s;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-meta {
      font-size: 0.68rem; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .news-source { font-weight: 600; color: var(--text2); }
    .news-time { font-style: italic; }

    /* ─── SIDEBAR ─── */
    .sidebar { position: sticky; top: 0; padding-top: 32px; }

    .sidebar-block { margin-bottom: 28px; }
    .sidebar-head {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text);
      border-top: 3px solid var(--text); padding-top: 8px;
      margin-bottom: 12px;
    }

    .trending-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid var(--border-light);
      text-decoration: none; cursor: pointer;
      transition: background 0.1s;
    }
    .trending-item:last-child { border-bottom: none; }
    .trending-item:hover .trending-text { color: var(--accent); }
    .trending-num {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.4rem; font-weight: 700; color: var(--border);
      flex-shrink: 0; width: 24px; line-height: 1; margin-top: 2px;
    }
    .trending-item:nth-child(1) .trending-num { color: var(--accent); }
    .trending-item:nth-child(2) .trending-num { color: #aaa; }
    .trending-item:nth-child(3) .trending-num { color: #b87333; }
    .trending-text {
      font-size: 0.82rem; color: var(--text); line-height: 1.4;
      font-weight: 600; transition: color 0.15s;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .trending-source { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    .cat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border-light);
      font-size: 0.8rem;
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-row-bar-wrap { flex: 1; margin: 0 12px; height: 2px; background: var(--border-light); }
    .cat-row-bar { height: 100%; border-radius: 1px; }
    .cat-count { font-size: 0.7rem; color: var(--muted); }

    /* ─── LOADING ─── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; gap: 16px; color: var(--muted);
    }
    .loader {
      width: 32px; height: 32px; border: 2px solid var(--border);
      border-top-color: var(--text); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ─── SKELETON ─── */
    .sk-block { background: #ece9e2; border-radius: 1px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer {
      0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 3px solid var(--text); margin-top: 48px;
      padding: 20px clamp(16px, 4vw, 48px);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-inner { max-width: 1300px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Libre Baskerville', serif; font-size: 1rem; font-weight: 700; color: var(--text); }
    .footer-logo span { color: var(--accent); }
    .footer-text { font-size: 0.72rem; color: var(--muted); font-style: italic; }

    /* ─── FADE IN ─── */
    .fade-in { animation: fadeIn 0.35s ease forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1100px) {
      .page-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; padding-top: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    }

    @media (max-width: 800px) {
      .story-featured { grid-template-columns: 1fr; gap: 0; }
      .story-featured-right { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 0; }
      .stories-secondary { grid-template-columns: 1fr 1fr; }
      .stories-secondary .story-secondary:last-child { border-top: 1px solid var(--border); grid-column: 1 / 3; }
      .sidebar { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .story-headline-xl { font-size: 1.7rem; }
      .stories-secondary { grid-template-columns: 1fr; }
      .stories-secondary .story-secondary { border-right: none; border-top: 1px solid var(--border); padding-left: 0; padding-right: 0; }
      .stories-secondary .story-secondary:first-child { border-top: none; }
      .news-row { grid-template-columns: 1fr; }
      .news-item { border-right: none; padding-left: 0; }
      .nav-filters {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
        background: rgba(26,26,26,0.97); backdrop-filter: blur(14px);
        border-top: 1px solid #333; padding: 6px 8px 10px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        scrollbar-width: none; border-left: none; margin-left: 0;
        display: flex; flex-wrap: nowrap;
      }
      .nav-filters::-webkit-scrollbar { display: none; }
      .filter-btn { height: 38px; flex-shrink: 0; font-size: 0.72rem; }
      .page-layout { padding-bottom: 70px; }
      footer { margin-bottom: 60px; }
      .masthead-inner { height: 52px; }
      .logo-tagline { display: none; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- MASTHEAD -->
<header class="masthead">
  <div class="masthead-inner">
    <a href="/" class="logo-wrap">
      <span class="logo">novinko<span class="logo-dot">.</span></span>
      <span class="logo-tagline">Všetky aktuálne správy</span>
    </a>
    <nav class="nav-filters">
      <button class="filter-btn active" data-cat="all">Všetko</button>
      <button class="filter-btn" data-cat="slovensko">Slovensko</button>
      <button class="filter-btn" data-cat="svet">Svet</button>
      <button class="filter-btn" data-cat="ekonomika">Ekonomika</button>
      <button class="filter-btn" data-cat="sport">Šport</button>
      <button class="filter-btn" data-cat="krypto">Krypto</button>
    </nav>
    <div class="masthead-right">
      <div class="live-badge">Live</div>
      <button class="refresh-btn" id="refreshBtn" title="Obnoviť">↻</button>
    </div>
  </div>
</header>

<!-- SECTION NAV -->
<div class="section-nav">
  <div class="section-nav-inner">
    <span class="edition-label">Správy pre slovenského čitateľa</span>
    <span class="last-update" id="lastUpdate"></span>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-wrap" id="tickerWrap">
  <div class="ticker-label">Správy</div>
  <div style="overflow:hidden;flex:1">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="page-layout">
  <main>
    <div id="content">
      <div class="loading">
        <div class="loader"></div>
        <span>Načítavam správy…</span>
      </div>
    </div>
  </main>
  <aside class="sidebar">
    <div class="sidebar-block">
      <div class="sidebar-head">Trending</div>
      <div id="trendingList">
        <div class="loading" style="padding:20px 0"><div class="loader" style="width:24px;height:24px;border-width:1px"></div></div>
      </div>
    </div>
    <div class="sidebar-block">
      <div class="sidebar-head">Podľa kategórie</div>
      <div id="catStats"></div>
    </div>
  </aside>
</div>

<footer>
  <div class="footer-inner">
    <span class="footer-logo">novinko<span>.</span></span>
    <span class="footer-text">Všetky aktuálne správy na jednom mieste</span>
  </div>
</footer>

<script>
  let allItems = [];
  let currentCat = 'all';

  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 60) return 'práve teraz';
    if (diff < 3600) return `${Math.floor(diff/60)} min`;
    if (diff < 86400) return `${Math.floor(diff/3600)} hod`;
    return `${Math.floor(diff/86400)} d`;
  }

  const CAT_LABELS = {
    slovensko: 'Slovensko', svet: 'Svet', ekonomika: 'Ekonomika',
    sport: 'Šport', krypto: 'Krypto'
  };
  const CAT_COLORS = {
    slovensko: '#1a3a5c', svet: '#4a235a', ekonomika: '#1a4a2a',
    sport: '#7a2a00', krypto: '#7a6200'
  };

  function getLabelClass(cat) {
    return `label-${cat}`;
  }

  function featuredStoryHTML(item) {
    const label = CAT_LABELS[item.category] || item.category;
    const href = item.link.startsWith('http') ? item.link : item.link;
    const target = item.link.startsWith('http') && !item.link.includes('localhost') && !item.link.includes('novinko.netlify') ? 'target="_blank" rel="noopener"' : '';
    return `
      <div class="story-featured fade-in">
        <div class="story-featured-left">
          <span class="story-label ${getLabelClass(item.category)}">${label}</span>
          <a href="${item.link}" ${target} class="story-headline-xl">${item.title}</a>
          ${item.description ? `<div class="story-summary">${item.description}</div>` : ''}
          <div class="story-byline">
            <span class="story-byline-source">${item.source}</span>
            <span class="story-byline-sep">—</span>
            <span class="story-byline-time">${timeAgo(item.pubDate)}</span>
          </div>
        </div>
        <div class="story-featured-right" id="secondary-stories"></div>
      </div>`;
  }

  function secondaryStoriesHTML(items) {
    return `<div class="stories-secondary">
      ${items.map(item => {
        const label = CAT_LABELS[item.category] || item.category;
        const target = item.link.startsWith('http') && !item.link.includes('novinko.netlify') && !item.link.includes('localhost') ? 'target="_blank" rel="noopener"' : '';
        return `<a href="${item.link}" ${target} class="story-secondary fade-in">
          <span class="story-label ${getLabelClass(item.category)}">${label}</span>
          <div class="story-headline-sm">${item.title}</div>
          <div class="story-byline">
            <span class="story-byline-source">${item.source}</span>
            <span class="story-byline-sep">—</span>
            <span class="story-byline-time">${timeAgo(item.pubDate)}</span>
          </div>
        </a>`;
      }).join('')}
    </div>`;
  }

  function newsListHTML(items) {
    let html = '<div class="news-list">';
    for (let i = 0; i < items.length; i += 2) {
      const a = items[i];
      const b = items[i + 1];
      html += '<div class="news-row">';
      html += newsItemHTML(a);
      if (b) html += newsItemHTML(b, true);
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function newsItemHTML(item, right = false) {
    const label = CAT_LABELS[item.category] || item.category;
    const target = item.link.startsWith('http') && !item.link.includes('novinko.netlify') && !item.link.includes('localhost') ? 'target="_blank" rel="noopener"' : '';
    return `<a href="${item.link}" ${target} class="news-item ${right ? 'news-item-right' : ''} fade-in">
      <span class="story-label ${getLabelClass(item.category)}">${label}</span>
      <div class="news-title">${item.title}</div>
      <div class="news-meta">
        <span class="news-source">${item.source}</span>
        <span>·</span>
        <span class="news-time">${timeAgo(item.pubDate)}</span>
      </div>
    </a>`;
  }

  function renderSidebar(items) {
    const trending = items.slice(0, 8);
    const tList = document.getElementById('trendingList');
    if (tList) {
      tList.innerHTML = trending.map((item, i) => {
        const target = item.link.startsWith('http') && !item.link.includes('novinko.netlify') && !item.link.includes('localhost') ? 'target="_blank" rel="noopener"' : '';
        return `<a href="${item.link}" ${target} class="trending-item">
          <div class="trending-num">${i + 1}</div>
          <div>
            <div class="trending-text">${item.title}</div>
            <div class="trending-source">${item.source} · ${timeAgo(item.pubDate)}</div>
          </div>
        </a>`;
      }).join('');
    }
    const cats = { slovensko: 0, svet: 0, ekonomika: 0, sport: 0, krypto: 0 };
    items.forEach(i => { if (cats[i.category] !== undefined) cats[i.category]++; });
    const total = items.length || 1;
    const catLabels = { slovensko: 'Slovensko', svet: 'Svet', ekonomika: 'Ekonomika', sport: 'Šport', krypto: 'Krypto' };
    const catStats = document.getElementById('catStats');
    if (catStats) {
      catStats.innerHTML = Object.entries(cats).map(([cat, count]) => `
        <div class="cat-row">
          <span style="font-size:0.78rem;font-weight:600;color:${CAT_COLORS[cat]||'#333'}">${catLabels[cat]}</span>
          <div class="cat-row-bar-wrap">
            <div class="cat-row-bar" style="background:${CAT_COLORS[cat]||'#333'};width:${Math.round(count/total*100)}%;min-width:${count?3:0}px"></div>
          </div>
          <span class="cat-count">${count}</span>
        </div>`).join('');
    }
  }

  function renderTicker(items) {
    const track = document.getElementById('tickerTrack');
    const wrap = document.getElementById('tickerWrap');
    const titles = items.slice(0, 15).map(i => `<span class="ticker-item">${i.title}</span>`).join('');
    track.innerHTML = titles + titles;
    wrap.style.display = 'flex';
  }

  function renderContent(items) {
    const content = document.getElementById('content');
    if (!items.length) { content.innerHTML = '<div class="loading"><span>Žiadne správy</span></div>'; return; }

    const featured = items[0];
    const secondary = items.slice(1, 4);
    const rest = items.slice(4);

    let html = '';

    // Featured + secondary side by side
    const label = CAT_LABELS[featured.category] || featured.category;
    const featTarget = featured.link.startsWith('http') && !featured.link.includes('novinko.netlify') && !featured.link.includes('localhost') ? 'target="_blank" rel="noopener"' : '';
    html += `<div class="story-featured fade-in">
      <div class="story-featured-left">
        <span class="story-label ${getLabelClass(featured.category)}">${label}</span>
        <a href="${featured.link}" ${featTarget} class="story-headline-xl">${featured.title}</a>
        ${featured.description ? `<div class="story-summary">${featured.description}</div>` : ''}
        <div class="story-byline">
          <span class="story-byline-source">${featured.source}</span>
          <span class="story-byline-sep">—</span>
          <span class="story-byline-time">${timeAgo(featured.pubDate)}</span>
        </div>
      </div>
      <div class="story-featured-right">
        ${secondary.map(item => {
          const lbl = CAT_LABELS[item.category] || item.category;
          const t = item.link.startsWith('http') && !item.link.includes('novinko.netlify') && !item.link.includes('localhost') ? 'target="_blank" rel="noopener"' : '';
          return `<a href="${item.link}" ${t} class="story-secondary fade-in" style="display:block;padding:16px 0;border-bottom:1px solid var(--border);text-decoration:none">
            <span class="story-label ${getLabelClass(item.category)}">${lbl}</span>
            <div class="story-headline-md">${item.title}</div>
            <div class="story-byline">
              <span class="story-byline-source">${item.source}</span>
              <span class="story-byline-sep">—</span>
              <span class="story-byline-time">${timeAgo(item.pubDate)}</span>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>`;

    // More stories below
    if (rest.length) {
      html += `<div class="section-head">
        <span class="section-head-title">Ďalšie správy</span>
        <span class="section-head-count">${rest.length} článkov</span>
      </div>`;
      html += newsListHTML(rest);
    }

    content.innerHTML = html;

    // Hover fix for secondary stories
    document.querySelectorAll('.story-secondary').forEach(el => {
      el.addEventListener('mouseenter', () => {
        const h = el.querySelector('.story-headline-md, .story-headline-sm');
        if (h) h.style.color = 'var(--accent)';
      });
      el.addEventListener('mouseleave', () => {
        const h = el.querySelector('.story-headline-md, .story-headline-sm');
        if (h) h.style.color = '';
      });
    });
  }

  async function loadNews(cat = 'all') {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    document.getElementById('content').innerHTML = '<div class="loading"><div class="loader"></div><span>Načítavam správy…</span></div>';
    try {
      const res = await fetch(`/.netlify/functions/fetch-rss?category=${cat}`);
      const data = await res.json();
      allItems = data.items || [];
      renderTicker(allItems);
      renderSidebar(allItems);
      renderContent(allItems);
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit' });
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="loading"><span>Chyba pri načítavaní správ</span></div>';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      loadNews(currentCat);
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', () => loadNews(currentCat));
  setInterval(() => loadNews(currentCat), 5 * 60 * 1000);
  loadNews();
</script>
</body>
</html>
