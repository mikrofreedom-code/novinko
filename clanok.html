<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novinko — Článok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e0ddd5;
      --accent: #c8a227;
      --text: #1a1a1a;
      --muted: #888;
      --header-bg: #1a1a1a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    header {
      background: var(--header-bg);
      border-bottom: 3px solid var(--accent);
      padding: 0 clamp(16px, 4vw, 48px);
    }
    .header-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; height: 64px; gap: 16px;
    }
    .back-btn {
      color: #aaa; text-decoration: none; font-size: 0.85rem;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }

    .article-wrap {
      max-width: 780px; margin: 0 auto;
      padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 48px);
    }

    .article-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
      background: rgba(200,162,39,0.15); color: var(--accent);
      border: 1px solid rgba(200,162,39,0.3);
    }

    .article-source {
      font-size: 0.75rem; color: var(--muted);
    }

    .article-date {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      background: #f5f0e0; padding: 2px 8px; border-radius: 10px; margin-left: auto;
    }

    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900; line-height: 1.2;
      color: var(--text); margin-bottom: 20px;
    }

    .article-perex {
      font-size: 1.1rem; font-weight: 500; line-height: 1.7;
      color: #444; border-left: 3px solid var(--accent);
      padding-left: 20px; margin-bottom: 32px;
    }

    /* AD SLOT */
    .ad-slot {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 4px; padding: 16px; text-align: center;
      color: var(--muted); font-size: 0.75rem; margin-bottom: 32px;
      min-height: 90px; display: flex; align-items: center; justify-content: center;
    }

    .article-content {
      font-size: 1rem; line-height: 1.8; color: #333;
    }

    .article-content p {
      margin-bottom: 20px;
    }

    .article-footer {
      margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }

    .source-link {
      font-size: 0.8rem; color: var(--muted);
    }

    .source-link a { color: var(--accent); }

    .back-link {
      font-size: 0.85rem; font-weight: 700;
      color: var(--accent); text-decoration: none;
      border: 1px solid var(--accent); padding: 8px 16px; border-radius: 4px;
      transition: all 0.2s;
    }
    .back-link:hover { background: var(--accent); color: #000; }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; gap: 16px; color: var(--muted);
    }
    .loader { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      border-top: 3px solid var(--accent); padding: 20px;
      text-align: center; color: var(--muted); font-size: 0.78rem;
      background: var(--surface); margin-top: 48px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-btn">← Späť</a>
    <a href="/" class="logo">novinko<span>.</span></a>
  </div>
</header>

<div class="article-wrap" id="articleWrap">
  <div class="loading">
    <div class="loader"></div>
    <span>Načítavam článok…</span>
  </div>
</div>

<footer>novinko &mdash; všetky aktuálne správy na jednom mieste</footer>

<script>
  const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtPtTXs5LQzJ1eULRyirCm_yec1EYGKokkihH2FfgHmh8p7gG9kGpstAPkxJHKtlm2VQcJ_uNh5-Oo/pub?gid=0&single=true&output=csv";

  function parseCSV(csv) {
    const lines = csv.trim().split("\n");
    const headers = lines[0].split(",");
    return lines.slice(1).map(line => {
      // Handle commas inside quoted fields
      const cols = [];
      let current = "";
      let inQuotes = false;
      for (let char of line) {
        if (char === '"') inQuotes = !inQuotes;
        else if (char === "," && !inQuotes) { cols.push(current); current = ""; }
        else current += char;
      }
      cols.push(current);
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = (cols[i] || "").trim().replace(/^"|"$/g, ""));
      return obj;
    });
  }

  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 60) return 'práve teraz';
    if (diff < 3600) return `${Math.floor(diff/60)} min`;
    if (diff < 86400) return `${Math.floor(diff/3600)} hod`;
    return `${Math.floor(diff/86400)} d`;
  }

  async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.getElementById("articleWrap").innerHTML = "<div class='loading'><span>Článok nenájdený</span></div>";
      return;
    }

    try {
      const res = await fetch(SHEET_CSV);
      const csv = await res.text();
      const articles = parseCSV(csv);
      const article = articles.find(a => a.id === id);

      if (!article) {
        document.getElementById("articleWrap").innerHTML = "<div class='loading'><span>Článok nenájdený</span></div>";
        return;
      }

      // Update page title
      document.title = `${article.title} — Novinko`;

      // Parse source and original link
      const sourceParts = article.source.split("|");
      const sourceName = sourceParts[0]?.trim() || "";
      const sourceLink = sourceParts[1]?.trim() || "";

      // Format content — odseky rozdelené \n\n
      const contentHTML = article.content
        .split("\\n\\n")
        .map(p => `<p>${p.trim()}</p>`)
        .join("");

      document.getElementById("articleWrap").innerHTML = `
        <div class="article-meta">
          <span class="cat-badge">₿ Krypto SK</span>
          <span class="article-source">${sourceName}</span>
          <span class="article-date">${timeAgo(article.date)}</span>
        </div>

        <h1 class="article-title">${article.title}</h1>

        <div class="article-perex">${article.perex}</div>

        <div class="ad-slot">
          <!-- Google AdSense banner 728x90 -->
          Reklamný priestor
        </div>

        <div class="article-content">
          ${contentHTML}
        </div>

        <div class="article-footer">
          <div class="source-link">
            Zdroj: <a href="${sourceLink}" target="_blank" rel="noopener">${sourceName}</a>
          </div>
          <a href="/" class="back-link">← Všetky správy</a>
        </div>
      `;

    } catch (e) {
      document.getElementById("articleWrap").innerHTML = "<div class='loading'><span>Chyba pri načítavaní</span></div>";
    }
  }

  loadArticle();
</script>
</body>
</html>
